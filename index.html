<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>diego.os</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;background:#0a0c09;color:#e8ebe4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center}
.card{background:#13160f;border:1px solid #2a2e24;border-radius:16px;padding:40px 32px;width:90%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.arrow{font-size:30px;color:#5dc6c6}
.name{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.dot{color:#5dc6c6}
label{display:block;font-size:12px;color:#7d837a;margin-bottom:8px}
.wrap{position:relative;margin-bottom:22px}
input{width:100%;background:#0a0c09;border:1px solid #2a2e24;border-radius:10px;color:#e8ebe4;font-size:15px;padding:13px 44px 13px 14px;outline:none;font-family:ui-monospace,monospace;letter-spacing:1px;-webkit-appearance:none}
input:focus{border-color:#5dc6c6}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#7d837a;font-size:16px;padding:4px}
.btn{width:100%;background:#5dc6c6;color:#0a0c09;border:none;border-radius:10px;font-size:15px;font-weight:700;padding:14px;cursor:pointer}
.btn:disabled{opacity:.5}
.st{margin-top:16px;font-size:13px;text-align:center;min-height:18px;color:#7d837a}
.st.err{color:#fb4934}.st.ok{color:#5dc6c6}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #2a2e24;border-top-color:#5dc6c6;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
footer{margin-top:24px;text-align:center;font-size:11px;color:#2a2e24}
#sb-wrap{display:none;position:fixed;bottom:16px;right:16px;z-index:99999}
#sb-wrap.on{display:block}
#sb-btn{background:#13160f;border:1px solid #2a2e24;border-radius:8px;padding:7px 12px;cursor:pointer;color:#7d837a;font-size:14px;width:100%;text-align:left}
#sb-btn:hover{border-color:#5dc6c6;color:#5dc6c6}
#sb{display:none;position:absolute;bottom:calc(100% + 8px);right:0;background:#13160f;border:1px solid #2a2e24;border-radius:12px;padding:12px 14px;box-shadow:0 4px 20px rgba(0,0,0,.5);font-size:13px;flex-direction:column;gap:8px;min-width:210px}
#sb.open{display:flex}
.st2{font-size:10px;color:#7d837a;text-transform:uppercase;letter-spacing:.5px}
.row{display:flex;gap:7px}
.sb{flex:1;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer}
.ub{background:#5dc6c6;color:#0a0c09}.rb{background:#83a598;color:#0a0c09}.cb{background:#2a2e24;color:#7d837a;flex:0;padding:8px 10px}
.ss{font-size:11px;color:#7d837a;min-height:14px}.ss.ok{color:#5dc6c6}.ss.er{color:#fb4934}
#pm{display:none;position:fixed;inset:0;z-index:999999;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:20px}
#pm.on{display:flex}
.mc{background:#13160f;border:1px solid #2a2e24;border-radius:14px;padding:28px 24px;width:100%;max-width:360px}
.mt{font-size:16px;font-weight:700;margin-bottom:4px;color:#e8ebe4}
.ms{font-size:13px;color:#7d837a;margin-bottom:18px}
.mi{width:100%;background:#0a0c09;border:1px solid #2a2e24;border-radius:8px;color:#e8ebe4;font-size:13px;padding:10px 12px;outline:none;font-family:ui-monospace,monospace;margin-bottom:12px;-webkit-appearance:none}
.mi:focus{border-color:#5dc6c6}
.ml{font-size:12px;color:#7d837a;margin-bottom:5px;display:block}
.hint{font-size:11px;color:#7d837a;margin-top:-8px;margin-bottom:12px}
.mr{display:flex;gap:8px;justify-content:flex-end}
.mb{border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer}
.mc2{background:#2a2e24;color:#7d837a}.ms2{background:#5dc6c6;color:#0a0c09}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="arrow">▸</span><span class="name">diego<span class="dot">.</span>os</span></div>
  <label for="pw">🔐 Password</label>
  <div class="wrap">
    <input type="password" id="pw" placeholder="••••••••••••••••" autofocus autocomplete="current-password">
    <button class="eye" id="ey" type="button">👁</button>
  </div>
  <button class="btn" id="ub">Sblocca</button>
  <div class="st" id="ls"></div>
  <footer>AES-256-GCM · PBKDF2 · 250k iter</footer>
</div>

<div id="sb-wrap">
  <div id="sb">
    <span class="st2">☁️ diego.os sync</span>
    <div class="row">
      <button class="sb ub" id="bk">⬆ Backup</button>
      <button class="sb rb" id="rs">⬇ Ripristina</button>
      <button class="sb cb" id="cf" title="Config">⚙</button>
    </div>
    <div class="ss" id="ss"></div>
  </div>
  <button id="sb-btn" onclick="(function(){var p=document.getElementById('sb');p.classList.toggle('open')})()">☁️ sync</button>
</div>

<div id="pm">
  <div class="mc">
    <div class="mt">🔑 GitHub Sync</div>
    <div class="ms">Credenziali cifrate nel browser.</div>
    <label class="ml">Username GitHub</label>
    <input class="mi" id="gu" placeholder="tuonome" autocomplete="off">
    <label class="ml">Repository</label>
    <input class="mi" id="gr" placeholder="diego-os" value="diego-os" autocomplete="off">
    <label class="ml">Personal Access Token</label>
    <input class="mi" id="gp" type="password" placeholder="github_pat_..." autocomplete="off">
    <div class="hint">Contents → Read and write sul repo.</div>
    <div class="mr">
      <button class="mb mc2" id="cx">Annulla</button>
      <button class="mb ms2" id="sv">Salva</button>
    </div>
  </div>
</div>

const CANALI_DISTRIBUZIONE = ['substack', 'instagram', 'tiktok', 'x', 'threads'];
const E=new TextEncoder(),D=new TextDecoder();
function b2b(b){const s=atob(b),u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u.buffer}
function b2s(b){return btoa(String.fromCharCode(...new Uint8Array(b)))}
async function dk(pw,salt,it){const km=await crypto.subtle.importKey('raw',E.encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}
async function enc(t,k){const iv=crypto.getRandomValues(new Uint8Array(12)),ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,E.encode(t));return JSON.stringify({iv:b2s(iv),ct:b2s(ct)})}
async function dec(j,k){const{iv,ct}=JSON.parse(j);return D.decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:b2b(iv)},k,b2b(ct)))}

document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('ub').click()});
document.getElementById('ub').onclick=async()=>{
  const pw=document.getElementById('pw').value,btn=document.getElementById('ub'),st=document.getElementById('ls');
  if(!pw){st.className='st err';st.textContent='Inserisci la password.';return}
  btn.disabled=true;st.className='st';st.innerHTML='<span class="spin"></span>Decriptando…';
  try{
    MK=await dk(pw,b2b(PL.salt),PL.iterations);
    let html;
    try{html=D.decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:b2b(PL.iv)},MK,b2b(PL.ct)))}
    catch{st.className='st err';st.textContent='❌ Password errata.';btn.disabled=false;MK=null;return}
    st.className='st ok';st.textContent='✓ Accesso concesso…';
    window.__MK=MK;
    await new Promise(r=>setTimeout(r,300));
    document.open();document.write(html);document.close();
    await new Promise(r=>setTimeout(r,900));
    injectSync();
  }catch(e){st.className='st err';st.textContent='❌ '+e.message;btn.disabled=false}
};
function injectSync(){
  const s=document.createElement('style');
  s.textContent='#dsb-wrap{position:fixed;bottom:16px;right:16px;z-index:99999;font-family:-apple-system,BlinkMacSystemFont,sans-serif}#dsb-btn{background:#13160f;border:1px solid #2a2e24;border-radius:8px;padding:7px 12px;cursor:pointer;color:#7d837a;font-size:14px;width:100%;text-align:left}#dsb-btn:hover{border-color:#5dc6c6;color:#5dc6c6}#dsb{display:none;position:absolute;bottom:calc(100% + 8px);right:0;background:#13160f;border:1px solid #2a2e24;border-radius:12px;padding:12px 14px;box-shadow:0 4px 20px rgba(0,0,0,.5);font-size:13px;flex-direction:column;gap:8px;min-width:210px;color:#e8ebe4}#dsb.open{display:flex}.st2{font-size:10px;color:#7d837a;text-transform:uppercase;letter-spacing:.5px}.row{display:flex;gap:7px}.sb{flex:1;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer}.ub{background:#5dc6c6;color:#0a0c09}.rb{background:#83a598;color:#0a0c09}.cb{background:#2a2e24;color:#7d837a;flex:0;padding:8px 10px}.ss{font-size:11px;color:#7d837a;min-height:14px}.ss.ok{color:#5dc6c6}.ss.er{color:#fb4934}#dpm{display:none;position:fixed;inset:0;z-index:999999;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:20px}#dpm.on{display:flex}.mc{background:#13160f;border:1px solid #2a2e24;border-radius:14px;padding:28px 24px;width:100%;max-width:360px;color:#e8ebe4}.mt{font-size:16px;font-weight:700;margin-bottom:4px}.ms{font-size:13px;color:#7d837a;margin-bottom:18px}.mi{width:100%;background:#0a0c09;border:1px solid #2a2e24;border-radius:8px;color:#e8ebe4;font-size:13px;padding:10px 12px;outline:none;font-family:ui-monospace,monospace;margin-bottom:12px}.mi:focus{border-color:#5dc6c6}.ml{font-size:12px;color:#7d837a;margin-bottom:5px;display:block}.hint{font-size:11px;color:#7d837a;margin-top:-8px;margin-bottom:12px}.mr2{display:flex;gap:8px;justify-content:flex-end}.mb{border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer}.mc2{background:#2a2e24;color:#7d837a}.ms2{background:#5dc6c6;color:#0a0c09}';
  document.head.appendChild(s);
  const b=document.createElement('div');b.id='dsb-wrap';
  b.innerHTML='<div id="dsb"><span class="st2">☁️ diego.os sync</span><div class="row"><button class="sb ub" id="dbk">⬆ Backup</button><button class="sb rb" id="drs">⬇ Ripristina</button><button class="sb cb" id="dcf">⚙</button></div><div class="ss" id="dss"></div></div><button id="dsb-btn" onclick="(function(){var p=document.getElementById(\'dsb\');p.classList.toggle(\'open\')})()">☁️ sync</button>';
  document.body.appendChild(b);
  const m=document.createElement('div');m.id='dpm';
  m.innerHTML='<div class="mc"><div class="mt">🔑 GitHub Sync</div><div class="ms">Credenziali cifrate nel browser.</div><label class="ml">Username GitHub</label><input class="mi" id="dgu" placeholder="tuonome" autocomplete="off"><label class="ml">Repository</label><input class="mi" id="dgr" placeholder="diego-os" value="diego-os" autocomplete="off"><label class="ml">Personal Access Token</label><input class="mi" id="dgp" type="password" placeholder="github_pat_..." autocomplete="off"><div class="hint">Contents → Read and write sul repo.</div><div class="mr2"><button class="mb mc2" id="dcx">Annulla</button><button class="mb ms2" id="dsv">Salva</button></div></div>';
  document.body.appendChild(m);
  const K=window.__MK;
  function ss(t,c=''){const e=document.getElementById('dss');if(e){e.className='ss'+(c?' '+c:'');e.textContent=t}}
  async function sav(u,r,p){localStorage.setItem('__ds',await enc(JSON.stringify({u,r,p}),K))}
  async function lod(){const x=localStorage.getItem('__ds');if(!x)return null;try{return JSON.parse(await dec(x,K))}catch{return null}}
  function opn(){lod().then(c=>{if(c){document.getElementById('dgu').value=c.u||'';document.getElementById('dgr').value=c.r||'diego-os'}});document.getElementById('dpm').classList.add('on')}
  function cls(){document.getElementById('dpm').classList.remove('on')}
  async function backup(){
    const c=await lod();if(!c){opn();return}
    ss('⬆ Backup in corso…');
    try{
      const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k!=='__ds')d[k]=localStorage.getItem(k)}
      const ct=await enc(JSON.stringify({ts:new Date().toISOString(),data:d}),K);
      const b64=btoa(unescape(encodeURIComponent(ct)));
      const url=`https://api.github.com/repos/${c.u}/${c.r}/contents/data-backup.enc`;
      const h={'Authorization':'Bearer '+c.p,'Accept':'application/vnd.github+json','Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28'};
      let sha;try{const r=await fetch(url,{headers:h});if(r.ok)sha=(await r.json()).sha}catch{}
      const body={message:'backup '+new Date().toISOString(),content:b64};if(sha)body.sha=sha;
      const r=await fetch(url,{method:'PUT',headers:h,body:JSON.stringify(body)});
      if(!r.ok)throw new Error('GitHub '+r.status);
      ss('✓ Backup completato','ok');
    }catch(e){ss('❌ '+e.message,'er')}
  }
  async function restore(){
    const c=await lod();if(!c){opn();return}
    ss('⬇ Scaricando…');
    try{
      const url=`https://api.github.com/repos/${c.u}/${c.r}/contents/data-backup.enc`;
      const r=await fetch(url,{headers:{'Authorization':'Bearer '+c.p,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}});
      if(!r.ok)throw new Error('File non trovato — fai prima un backup.');
      const j=await r.json();
      const raw=decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))));
      const{ts,data}=JSON.parse(await dec(raw,K));
      Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,v));
      ss('✓ Ripristinato ('+ts.slice(0,10)+')','ok');
      setTimeout(()=>location.reload(),1200);
    }catch(e){ss('❌ '+e.message,'er')}
  }
  document.getElementById('dbk').onclick=backup;
  document.getElementById('drs').onclick=restore;
  document.getElementById('dcf').onclick=opn;
  document.getElementById('dcx').onclick=cls;
  document.getElementById('dsv').onclick=async()=>{
    const u=document.getElementById('dgu').value.trim(),r=document.getElementById('dgr').value.trim(),p=document.getElementById('dgp').value.trim();
    if(!u||!r||!p){alert('Compila tutti i campi.');return}
    await sav(u,r,p);cls();ss('✓ Credenziali salvate','ok');
  };
}
</script>
